<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geofont 13 Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:wght@300;400;600&family=JetBrains+Mono:wght@300;400;500&display=swap');

        :root {
            --bg: #07080a;
            --surface: #0d0f14;
            --panel: #12151c;
            --gold: #c8a84b;
            --gold-dim: rgba(200, 168, 75, 0.2);
            --ccw: #4ab8c8;
            --cw: #c84a4a;
            --text: #e8e0cc;
            --dim: rgba(232, 224, 204, 0.4);
            --accent: #c8a84b;
            --border: rgba(200, 168, 75, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            letter-spacing: 0.3em;
            color: var(--gold);
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        .nav-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--dim);
            cursor: pointer;
            transition: color 0.2s;
            text-transform: uppercase;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--gold);
        }

        .nav-item.active {
            border-bottom: 1px solid var(--gold);
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Controls Wrapper */
        .sidebar {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 4px;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .control-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            color: var(--dim);
            text-transform: uppercase;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 80px;
            height: 2px;
            background: var(--gold-dim);
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--gold-dim);
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.1em;
        }

        .btn:hover {
            background: var(--gold-dim);
            border-color: var(--gold);
        }

        .btn.active {
            background: var(--gold-dim);
            border-color: var(--gold);
        }

        /* Typesetter */
        #typesetter-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            outline: none;
        }

        #typesetter-output {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 2rem;
            background: var(--panel);
            border: 1px solid var(--border);
            min-height: 300px;
        }

        .word-glyph {
            position: relative;
            cursor: help;
        }

        .word-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--gold);
            padding: 0.8rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            z-index: 100;
            width: 200px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .word-glyph:hover .word-tooltip {
            opacity: 1;
        }

        /* Alphabet Grid */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }

        .letter-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .letter-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: var(--dim);
            text-align: center;
        }

        /* Analyser */
        .analyser-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .analyser-stats {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
        }

        /* Compare */
        .compare-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .compare-overlay {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            background: var(--panel);
            padding: 2rem;
            border: 1px solid var(--border);
        }
    </style>
</head>

<body>

    <header>
        <h1>GEOFONT 13 STUDIO</h1>
        <nav>
            <div class="nav-item active" data-tab="typesetter">Typesetter</div>
            <div class="nav-item" data-tab="analyser">Analyser</div>
            <div class="nav-item" data-tab="alphabet">Alphabet</div>
            <div class="nav-item" data-tab="compare">Compare</div>
            <div class="nav-item" data-tab="studies">Word Studies</div>
        </nav>
    </header>

    <main>
        <div class="sidebar">
            <div class="control-group">
                <span class="control-label">Size</span>
                <input type="range" id="global-size" min="40" max="240" value="100">
            </div>
            <div class="control-group">
                <span class="control-label">Weight</span>
                <input type="range" id="global-weight" min="0.5" max="5" step="0.5" value="1.5">
            </div>
            <div class="control-group">
                <span class="control-label">Ring Step</span>
                <input type="range" id="global-rs" min="5" max="25" value="12">
            </div>
            <div class="control-group">
                <span class="control-label">Color</span>
                <button class="btn active" id="btn-color-on">ON</button>
                <button class="btn" id="btn-color-off">OFF</button>
            </div>
        </div>

        <!-- Typesetter Tab -->
        <div id="typesetter" class="tab-content active">
            <textarea id="typesetter-input" rows="4" placeholder="Enter text to typeset..."></textarea>
            <div id="typesetter-output"></div>
        </div>

        <!-- Analyser Tab -->
        <div id="analyser" class="tab-content">
            <div class="analyser-layout">
                <div id="analyser-visual"
                    style="display:flex; justify-content:center; align-items:center; background:var(--panel); border:1px solid var(--border)">
                    <canvas id="analyser-canvas"></canvas>
                </div>
                <div class="analyser-stats" id="analyser-stats">
                    <h3 style="font-family:'Cinzel'; color:var(--gold); margin-bottom:1rem">STABILITY AUDIT</h3>
                    <!-- Data will be injected here -->
                </div>
            </div>
        </div>

        <!-- Alphabet Tab -->
        <div id="alphabet" class="tab-content">
            <div class="alphabet-grid" id="alphabet-grid"></div>
        </div>

        <!-- Compare Tab -->
        <div id="compare" class="tab-content">
            <div class="sidebar" style="margin-bottom:1rem">
                <input type="text" id="comp-1" value="LOVE"
                    style="background:var(--bg); color:var(--text); border:1px solid var(--border); padding:0.4rem; font-family:'JetBrains Mono'">
                <span class="control-label">vs</span>
                <input type="text" id="comp-2" value="HATE"
                    style="background:var(--bg); color:var(--text); border:1px solid var(--border); padding:0.4rem; font-family:'JetBrains Mono'">
                <button class="btn" id="btn-compare">COMPARE</button>
            </div>
            <div class="compare-layout">
                <div id="comp-v1"
                    style="background:var(--panel); padding:1rem; border:1px solid var(--border); display:flex; justify-content:center">
                </div>
                <div id="comp-v2"
                    style="background:var(--panel); padding:1rem; border:1px solid var(--border); display:flex; justify-content:center">
                </div>
                <div class="compare-overlay">
                    <canvas id="compare-canvas"></canvas>
                </div>
            </div>
        </div>

        <!-- Word Studies Tab -->
        <div id="studies" class="tab-content">
            <div id="studies-grid"
                style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:1.5rem"></div>
        </div>

    </main>

    <script>
        // --- CORE DATA & LOGIC ---
        const ND = [
            { id: 0, b: 0, l: ['A', 'B'], r: [72, 58] },
            { id: 1, b: 27.7, l: ['C', 'D'], r: [94, 91] },
            { id: 2, b: 55.4, l: ['E', 'F'], r: [34, 31] },
            { id: 3, b: 83.1, l: ['G', 'H'], r: [67, 45] },
            { id: 4, b: 110.8, l: ['I', 'J'], r: [78, 88] },
            { id: 5, b: 138.5, l: ['K', 'L'], r: [63, 52] },
            { id: 6, b: 166.2, l: ['M', 'N'], r: [71, 69] },
            { id: 7, b: 193.8, l: ['O', 'P'], r: [98, 93] },
            { id: 8, b: 221.5, l: ['Q', 'R'], r: [89, 84] },
            { id: 9, b: 249.2, l: ['S', 'T'], r: [96, 47] },
            { id: 10, b: 276.9, l: ['U', 'V'], r: [92, 87] },
            { id: 11, b: 304.6, l: ['W', 'X'], r: [74, 91] },
            { id: 12, b: 332.3, l: ['Y', 'Z'], r: [68, 43] },
        ];

        const LM = {};
        ND.forEach(n => n.l.forEach((ch, i) => {
            LM[ch] = {
                node: n.id,
                bearing: n.b,
                ccw: i === 0, // Odd alphabetical indices (A, C, E...) are CCW
                n: n.id + 1,
                res: n.r[i],
                pair: n.l[1 - i]
            };
        }));

        const SHEAR_LINE = 39.4;

        const OPT = {
            color: true,
            size: 100,
            weight: 1.5,
            ringStep: 12
        };

        // --- RENDER ENGINE ---
        function drawWord(canvas, word, size, lwScale = 1) {
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = canvas.height = size * dpr;
            canvas.style.width = canvas.style.height = size + 'px';
            ctx.scale(dpr, dpr);

            ctx.fillStyle = '#07080a';
            ctx.fillRect(0, 0, size, size);

            const letters = word.toUpperCase().split('').filter(c => LM[c]);
            if (!letters.length) return;

            const cx = size / 2, cy = size / 2;
            const R_outer = size * 0.44;
            const R_guard = size * 0.08;
            const rs = OPT.ringStep * (size / 100);
            const ringStep = Math.min(rs, (R_outer - R_guard) / Math.max(letters.length, 1));
            const lw = OPT.weight * (size / 100) * lwScale;

            // Outer circle
            ctx.beginPath();
            ctx.arc(cx, cy, R_outer, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(200, 168, 75, 0.15)';
            ctx.lineWidth = lw * 0.4;
            ctx.stroke();

            // North tick
            ctx.beginPath();
            ctx.moveTo(cx, cy - R_outer - lw * 2);
            ctx.lineTo(cx, cy - R_outer + lw * 0.5);
            ctx.strokeStyle = 'rgba(200, 168, 75, 0.4)';
            ctx.lineWidth = lw * 0.3;
            ctx.stroke();

            // Shear Line Marker
            const shearRad = (SHEAR_LINE - 90) * (Math.PI / 180);
            ctx.beginPath();
            ctx.moveTo(cx + (R_outer - lw * 3) * Math.cos(shearRad), cy + (R_outer - lw * 3) * Math.sin(shearRad));
            ctx.lineTo(cx + (R_outer + lw * 1) * Math.cos(shearRad), cy + (R_outer + lw * 1) * Math.sin(shearRad));
            ctx.strokeStyle = 'rgba(200, 168, 75, 0.3)';
            ctx.lineWidth = lw * 0.3;
            ctx.stroke();

            let curR = R_outer;
            let curBearing = 0; // radians
            let prevDir = null;
            let firstPoint = true;

            function pt(r, b) {
                const x = cx + r * Math.sin(b);
                const y = cy - r * Math.cos(b);
                if (firstPoint) { ctx.moveTo(x, y); firstPoint = false; }
                else ctx.lineTo(x, y);
            }

            ctx.beginPath();
            ctx.strokeStyle = OPT.color ? '#e8e0cc' : 'rgba(232, 224, 204, 0.8)';
            ctx.lineWidth = lw;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            for (let i = 0; i < letters.length; i++) {
                const ch = letters[i];
                const info = LM[ch];
                if (curR <= R_guard) break;

                const arcLen = (info.n / 13) * 2 * Math.PI;
                const sign = info.ccw ? -1 : 1;
                const thisDir = info.ccw ? 'ccw' : 'cw';

                // Radial drop
                if (prevDir === thisDir) {
                    const dropR = Math.max(curR - ringStep * 0.35, R_guard);
                    for (let s = 1; s <= 6; s++) {
                        pt(curR + (dropR - curR) * (s / 6), curBearing);
                    }
                    curR = dropR;
                }

                const steps = Math.max(40, Math.round((arcLen / (Math.PI * 2)) * 120));
                const R_end = info.ccw ? Math.max(curR - ringStep, R_guard) : curR;

                // Draw segment
                if (OPT.color) ctx.strokeStyle = info.ccw ? '#4ab8c8' : '#c84a4a';

                for (let s = 0; s <= steps; s++) {
                    const t = s / steps;
                    pt(curR + (R_end - curR) * t, curBearing + sign * arcLen * t);
                }

                curBearing += sign * arcLen;
                curR = R_end;
                prevDir = thisDir;
            }
            ctx.stroke();

            // Entry dot
            const startInfo = LM[letters[0]];
            if (startInfo) {
                const sx = cx + R_outer * Math.sin(0);
                const sy = cy - R_outer * Math.cos(0);
                ctx.beginPath();
                ctx.arc(sx, sy, lw * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = '#c8a84b';
                ctx.fill();
            }
        }

        // --- TABS & NAVIGATION ---
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(item.dataset.tab).classList.add('active');
                refreshCurrentTab();
            });
        });

        function refreshCurrentTab() {
            const activeTab = document.querySelector('.tab-content.active').id;
            if (activeTab === 'typesetter') renderTypesetter();
            if (activeTab === 'alphabet') renderAlphabet();
            if (activeTab === 'analyser') renderAnalyser();
            if (activeTab === 'studies') renderStudies();
            if (activeTab === 'compare') renderCompare();
        }

        // --- TYPESETTER ---
        function renderTypesetter() {
            const text = document.getElementById('typesetter-input').value;
            const out = document.getElementById('typesetter-output');
            out.innerHTML = '';

            if (!text) return;

            const tokens = text.split(/(\s+)/);
            tokens.forEach(token => {
                if (/^\s+$/.test(token)) {
                    const sp = document.createElement('div');
                    sp.style.width = (OPT.size * 0.25) + 'px';
                    out.appendChild(sp);
                } else {
                    const wrap = document.createElement('div');
                    wrap.className = 'word-glyph';
                    const canvas = document.createElement('canvas');
                    drawWord(canvas, token, OPT.size);
                    wrap.appendChild(canvas);

                    // Tooltip
                    const tt = document.createElement('div');
                    tt.className = 'word-tooltip';
                    const letters = token.toUpperCase().split('').filter(c => LM[c]);
                    let trace = `<b>${token.toUpperCase()}</b><br><br>`;
                    let bearing = 0;
                    letters.forEach(c => {
                        const info = LM[c];
                        const delta = (info.n / 13) * 360 * (info.ccw ? -1 : 1);
                        bearing = (bearing + delta) % 360;
                        trace += `${c}: ${info.ccw ? 'CCW' : 'CW'} ${info.n}/13 → ${bearing.toFixed(1)}°<br>`;
                    });
                    const finalBearing = ((bearing % 360) + 360) % 360;
                    const dist = Math.min(Math.abs(finalBearing - SHEAR_LINE), 360 - Math.abs(finalBearing - SHEAR_LINE));
                    const stability = dist < 10 ? 'RESOLVED' : 'UNSTABLE';
                    trace += `<br><span style="color:var(--gold)">STABILITY: ${stability}</span>`;
                    tt.innerHTML = trace;
                    wrap.appendChild(tt);

                    out.appendChild(wrap);
                }
            });
        }

        // --- ALPHABET ---
        function renderAlphabet() {
            const grid = document.getElementById('alphabet-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 26; i++) {
                const char = String.fromCharCode(65 + i);
                const card = document.createElement('div');
                card.className = 'letter-card';
                const canvas = document.createElement('canvas');
                drawWord(canvas, char, 100);
                card.appendChild(canvas);

                const info = document.createElement('div');
                info.className = 'letter-info';
                const f = LM[char];
                info.innerHTML = `<b>${char}</b> (Pair: ${f.pair})<br>Node ${f.node + 1} | ${f.ccw ? 'CCW' : 'CW'}<br>${f.bearing}° | Arc ${f.n}/13`;
                card.appendChild(info);
                grid.appendChild(card);
            }
        }

        // --- ANALYSER ---
        function renderAnalyser() {
            const text = document.getElementById('typesetter-input').value;
            const input = text.split(/\s+/).filter(x => x.length > 0)[0] || 'GEOFONT';
            const canvas = document.getElementById('analyser-canvas');
            drawWord(canvas, input, 300);

            const statsArr = document.getElementById('analyser-stats');
            const letters = input.toUpperCase().split('').filter(c => LM[c]);
            let html = `<h3 style="font-family:'Cinzel'; color:var(--gold); margin-bottom:1rem">${input.toUpperCase()}</h3>`;
            html += `<div style="font-family:'JetBrains Mono'; font-size:0.7rem; color:var(--dim)">`;

            let bearing = 0;
            let drops = 0;
            let prevDir = null;

            letters.forEach(c => {
                const info = LM[c];
                const arc = (info.n / 13) * 360;
                const dir = info.ccw ? -1 : 1;
                if (prevDir === (info.ccw ? 'ccw' : 'cw')) drops++;
                bearing = (bearing + arc * dir);
                html += `<div style="margin-bottom:0.4rem; padding:0.3rem; border-bottom:1px solid rgba(255,255,255,0.05)">
            <span style="color:${info.ccw ? 'var(--ccw)' : 'var(--cw)'}">${c}</span> | 
            N${info.n} | ${info.ccw ? 'CCW' : 'CW'} | Δ${arc.toFixed(1)}° | Σ${(((bearing % 360) + 360) % 360).toFixed(1)}°
        </div>`;
                prevDir = info.ccw ? 'ccw' : 'cw';
            });

            const totalArc = letters.reduce((s, c) => s + LM[c].n, 0);
            const finalBearing = ((bearing % 360) + 360) % 360;
            const dist = Math.min(Math.abs(finalBearing - SHEAR_LINE), 360 - Math.abs(finalBearing - SHEAR_LINE));

            html += `</div><div style="margin-top:1.5rem; display:grid; grid-template-columns:1fr 1fr; gap:1rem">
        <div style="background:var(--panel); padding:0.8rem; border:1px solid var(--border)">
            <div class="control-label">Total Turns</div>
            <div style="font-size:1.2rem; color:var(--gold)">${(totalArc / 13).toFixed(2)}</div>
        </div>
        <div style="background:var(--panel); padding:0.8rem; border:1px solid var(--border)">
            <div class="control-label">Radial Drops</div>
            <div style="font-size:1.2rem; color:var(--gold)">${drops}</div>
        </div>
        <div style="background:var(--panel); padding:0.8rem; border:1px solid var(--border); grid-column:span 2">
            <div class="control-label">Shear Stability (Δ ${dist.toFixed(1)}°)</div>
            <div style="font-size:1rem; color:${dist < 10 ? '#4ac87d' : '#c84a4a'}">
                ${dist < 10 ? 'STABLE ATTRACTOR' : 'UNSTABLE'}
            </div>
        </div>
    </div>`;

            statsArr.innerHTML = html;
        }

        // --- COMPARE ---
        function renderCompare() {
            const w1 = document.getElementById('comp-1').value || 'LOVE';
            const w2 = document.getElementById('comp-2').value || 'HATE';

            const v1 = document.getElementById('comp-v1');
            const v2 = document.getElementById('comp-v2');
            v1.innerHTML = ''; v2.innerHTML = '';

            const c1 = document.createElement('canvas'); drawWord(c1, w1, 150); v1.appendChild(c1);
            const c2 = document.createElement('canvas'); drawWord(c2, w2, 150); v2.appendChild(c2);

            const ov = document.getElementById('compare-canvas');
            const size = 300;
            const ctx = ov.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            ov.width = ov.height = size * dpr;
            ov.style.width = ov.style.height = size + 'px';
            ctx.scale(dpr, dpr);

            // Custom overlay draw
            ctx.fillStyle = '#07080a'; ctx.fillRect(0, 0, size, size);

            // Draw W1 in cyan (opacity)
            ctx.globalAlpha = 0.6;
            drawWordOverlay(ctx, w1, size, '#4ab8c8');

            // Draw W2 in red (opacity)
            ctx.globalAlpha = 0.6;
            drawWordOverlay(ctx, w2, size, '#c84a4a');
            ctx.globalAlpha = 1.0;
        }

        function drawWordOverlay(ctx, word, size, color) {
            const cx = size / 2, cy = size / 2;
            const R_outer = size * 0.44;
            const R_guard = size * 0.08;
            const letters = word.toUpperCase().split('').filter(c => LM[c]);
            const ringStep = (R_outer - R_guard) / Math.max(letters.length, 1);
            const lw = 2;

            let curR = R_outer;
            let curBearing = 0;
            let firstPoint = true;

            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.lineCap = 'round';

            for (let ch of letters) {
                const info = LM[ch];
                const arc = (info.n / 13) * 2 * Math.PI;
                const sign = info.ccw ? -1 : 1;
                const R_end = info.ccw ? curR - ringStep : curR;

                const steps = 60;
                for (let s = 0; s <= steps; s++) {
                    const t = s / steps;
                    const r = curR + (R_end - curR) * t;
                    const b = curBearing + sign * arc * t;
                    const x = cx + r * Math.sin(b);
                    const y = cy - r * Math.cos(b);
                    if (firstPoint) { ctx.moveTo(x, y); firstPoint = false; }
                    else ctx.lineTo(x, y);
                }
                curBearing += sign * arc;
                curR = R_end;
            }
            ctx.stroke();
        }

        // --- STUDIES ---
        const STUDIES = [
            { word: 'SPIRAL', desc: 'Exactly 3.00 Turns. Mathematical Resolve.' },
            { word: 'STOP', desc: 'Perfect Alternation. 100% Stability.' },
            { word: 'HEAVEN', desc: 'Bipolar Balance. Deep Dive. Stable attractor.' },
            { word: 'HELL', desc: 'CW Cluster. Perimeter rattle. Extreme centripetal pressure.' },
            { word: 'VOID', desc: 'Minimalist interference. Low turn count.' },
            { word: 'LIGHT', desc: 'Balanced resonance. High stability score.' },
            { word: 'EYES', desc: 'Pure CCW Descent. Centripetal pressure.' },
            { word: 'MOON', desc: 'Stacked CCW Arcs. Radial pulse.' }
        ];

        function renderStudies() {
            const grid = document.getElementById('studies-grid');
            grid.innerHTML = '';
            STUDIES.forEach(s => {
                const card = document.createElement('div');
                card.className = 'letter-card';
                card.style.flexDirection = 'row';
                card.style.justifyContent = 'flex-start';
                card.style.width = '100%';

                const canvas = document.createElement('canvas');
                drawWord(canvas, s.word, 120);
                card.appendChild(canvas);

                const info = document.createElement('div');
                info.style.marginLeft = '1rem';
                info.innerHTML = `<div style="font-family:'Cinzel'; font-size:1.1rem; color:var(--gold)">${s.word}</div>
            <div style="font-size:0.65rem; color:var(--dim); margin-top:0.4rem">${s.desc}</div>`;
                card.appendChild(info);
                grid.appendChild(card);
            });
        }

        // --- CONTROLS ---
        document.getElementById('global-size').oninput = (e) => { OPT.size = parseInt(e.target.value); refreshCurrentTab(); };
        document.getElementById('global-weight').oninput = (e) => { OPT.weight = parseFloat(e.target.value); refreshCurrentTab(); };
        document.getElementById('global-rs').oninput = (e) => { OPT.ringStep = parseInt(e.target.value); refreshCurrentTab(); };
        document.getElementById('btn-color-on').onclick = () => { OPT.color = true; document.getElementById('btn-color-on').classList.add('active'); document.getElementById('btn-color-off').classList.remove('active'); refreshCurrentTab(); };
        document.getElementById('btn-color-off').onclick = () => { OPT.color = false; document.getElementById('btn-color-off').classList.add('active'); document.getElementById('btn-color-on').classList.remove('active'); refreshCurrentTab(); };
        document.getElementById('typesetter-input').oninput = () => { if (document.querySelector('.nav-item.active').dataset.tab === 'typesetter') renderTypesetter(); if (document.querySelector('.nav-item.active').dataset.tab === 'analyser') renderAnalyser(); };
        document.getElementById('btn-compare').onclick = () => { renderCompare(); };

        // --- INIT ---
        renderTypesetter();
        renderAlphabet();

    </script>
</body>
